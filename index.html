<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Employee Time Log Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="main-login" class="section active">
            <h1>⏰ Employee Time Log Management</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">Choose your action</p>
           
            <div class="role-buttons">
                <button class="role-btn employee-role" onclick="showEmployeeLogin()">
                    👤 Employee Login
                </button>
                <button class="role-btn register-role" onclick="showEmployeeRegister()">
                    ➕ Register New Employee
                </button>
                <button class="role-btn admin-role" onclick="showAdminLogin()">
                    👨‍💼 Admin
                </button>
            </div>
        </div>


        <div id="employee-register" class="section">
            <button class="back-btn" onclick="showMainLogin()">← Back</button>
            <h2>👤 Register New Employee</h2>
           
            <!-- <label>Employee ID:</label>
            <input type="text" id="reg-emp-id" placeholder="EMP001" maxlength="10"> -->


            <label>Username:</label>
            <input type="text" id="reg-emp-username" placeholder="johndoe">


            <label>Full Name:</label>
            <input type="text" id="reg-emp-name" placeholder="John Doe">


            <label>Password:</label>
            <input type="password" id="reg-emp-pass" placeholder="Create password">


            <label>Confirm Password:</label>
            <input type="password" id="reg-emp-pass-confirm" placeholder="Confirm password">


            <button class="primary-btn" onclick="employeeRegister()">Register Employee</button>
            <div id="reg-message"></div>
        </div>


        <div id="employee-login" class="section">
            <button class="back-btn" onclick="showMainLogin()">← Back</button>
            <h2>👤 Employee Login</h2>
           
            <label>Username:</label>
            <input type="text" id="emp-username" placeholder="Enter username">


            <label>Password:</label>
            <input type="password" id="emp-pass" placeholder="Enter password">


            <button class="primary-btn" onclick="employeeLogin()">Login</button>
            <div id="login-message"></div>
        </div>


        <div id="employee-dashboard" class="section">
            <button class="back-btn" onclick="showMainLogin()">← Home</button>
            <div class="user-info">
                <span>👤 <strong id="emp-user"></strong></span>
                <button class="logout-btn" onclick="employeeLogout()">Logout</button>
            </div>


            <div class="action-grid">
                <button class="action-btn time-in" onclick="empAction(1)">🟢 Time In</button>
                <button class="action-btn time-out" onclick="empAction(2)">🔴 Time Out</button>
                <button class="action-btn lunch-start" onclick="empAction(3)">🍽️ Lunch Start</button>
                <button class="action-btn lunch-end" onclick="empAction(4)">✅ Lunch End</button>
                <button class="action-btn view-record" onclick="empAction(5)" style="grid-column: span 2;">📊 View Record</button>
            </div>


            <div class="logs" id="emp-logs">Ready to track your time...</div>
        </div>


        <div id="admin-login" class="section">
            <button class="back-btn"
                id="_return"
            >← Back</button>
            <h2>👨‍💼 Admin Login</h2>
           
            <label>Admin User:</label>
            <input type="text" id="admin-id" placeholder="Enter username">


            <label>Password:</label>
            <input type="password" id="admin-pass" placeholder="Enter password">


            <button class="primary-btn" onclick="adminLogin()">Login</button>
        </div>


        <div id="admin-dashboard" class="section">
            <button class="back-btn" onclick="showMainLogin()">← Home</button>
            <div class="user-info">
                <span>👨‍💼 <strong id="admin-user"></strong></span>
                <button class="logout-btn" onclick="adminLogout()">Logout</button>
            </div>


            <label>🔍 Search Employee ID:</label>
            <input type="text" id="search-emp" placeholder="EMP001">


            <div class="action-grid">
                <button class="action-btn" onclick="adminViewSingle()">👤 View Single</button>
                <button class="action-btn" onclick="adminViewAll()">👥 View All</button>
                <button class="action-btn" onclick="adminManageUsers()" style="grid-column: span 2;">👥 Manage Users</button>
                <button class="action-btn" onclick="adminClear()" style="grid-column: span 2;">🗑️ Clear Search</button>
            </div>


            <div class="logs" id="admin-logs">Admin dashboard ready...</div>
        </div>
    </div>


    <script>
        let employeeData = JSON.parse(localStorage.getItem('employeeData')) || {};
        let employeeAccounts = JSON.parse(localStorage.getItem('employeeAccounts')) || {};
        let currentEmpUser = null;
        let currentAdminUser = null;


        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }


        function generateEmployeeID() {
        const count = Object.keys(employeeAccounts).length + 1;
        return 'EMP' + String(count).padStart(3, '0');
    }


        function showMainLogin() {
            // clearAllMessages();
            // showSection('main-login');
            _return.addEventListener("click", window.location.replace("file:///C:/Users/arnol/Documents/index.html"));
        }
        let _return = document.getElementById('_return');




        function showEmployeeRegister() { showSection('employee-register'); }
        function showEmployeeLogin() { showSection('employee-login'); }
        function showAdminLogin() { showSection('admin-login'); }


        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = type;
        }
        function employeeRegister() {
            // const id = document.getElementById('reg-emp-id').value.trim().toUpperCase();
            const id = generateEmployeeID();
            const username = document.getElementById('reg-emp-username').value.trim().toLowerCase();
            const name = document.getElementById('reg-emp-name').value.trim();
            const pass = document.getElementById('reg-emp-pass').value;
            const passConfirm = document.getElementById('reg-emp-pass-confirm').value;
            const messageEl = document.getElementById('reg-message');


            if ( !username || !name || !pass || !passConfirm) {
                showMessage(messageEl, 'All fields are required!', 'error');
                return;
            }


            if (pass !== passConfirm) {
                showMessage(messageEl, 'Passwords do not match!', 'error');
                return;
            }


            if (pass.length < 6) {
                showMessage(messageEl, 'Password must be at least 6 characters!', 'error');
                return;
            }


            if (employeeAccounts[id]) {
                showMessage(messageEl, `Employee ID ${id} already exists!`, 'error');
                return;
            }


            if (Object.values(employeeAccounts).some(acc => acc.username === username)) {
                showMessage(messageEl, `Username "${username}" already taken!`, 'error');
                return;
            }


            employeeAccounts[id] = {
                username: username,
                name: name,
                password: pass,
                created: new Date().toLocaleDateString()
            };


            localStorage.setItem('employeeAccounts', JSON.stringify(employeeAccounts));
            employeeData[id] = {}; // Initialize empty time data


            // showMessage(messageEl, `✅ Employee ${name} (${id}) registered successfully!`, 'success');
            showMessage(messageEl, `✅ Employee ${name} (${id}) registered successfully!`, 'success');
            // Clear form after 2 seconds
            setTimeout(() => {
                // document.getElementById('reg-emp-id').value = '';
                document.getElementById('reg-emp-username').value = '';
                document.getElementById('reg-emp-name').value = '';
                document.getElementById('reg-emp-pass').value = '';
                document.getElementById('reg-emp-pass-confirm').value = '';
                showMainLogin();
            }, 2000);
        }


        // EMPLOYEE LOGIN
        function employeeLogin() {
            const username = document.getElementById('emp-username').value.trim().toLowerCase();
            const pass = document.getElementById('emp-pass').value;
            const messageEl = document.getElementById('login-message');


            if (!username || !pass) {
                showMessage(messageEl, 'Enter Username & Password', 'error');
                return;
            }


            const account = Object.entries(employeeAccounts).find(([id, acc]) => acc.username === username);
            if (!account) {
                showMessage(messageEl, 'Username not found! Register first.', 'error');
                return;
            }


            const [id, acc] = account;
            if (acc.password !== pass) {
                showMessage(messageEl, 'Wrong Password!', 'error');
                return;
            }


            currentEmpUser = id;
            document.getElementById('emp-user').textContent = `${acc.name} (${id})`;
            showSection('employee-dashboard');
            showEmpMessage(`Welcome ${acc.name}!`, 'success');
        }


        function employeeLogout() {
            currentEmpUser = null;
            showMainLogin();
            document.getElementById('emp-username').value = '';
            document.getElementById('emp-pass').value = '';
        }


        // EMPLOYEE TIME TRACKING
        function empAction(action) {
            if (!currentEmpUser) return;


            const id = currentEmpUser;
            let r = employeeData[id] || {};


            switch(action) {
                case 1: // Time In
                    if (r.timeIn) {
                        showEmpMessage('Already Time In today!', 'warning');
                    } else {
                        employeeData[id] = { timeIn: new Date() };
                        localStorage.setItem('employeeData', JSON.stringify(employeeData));
                        showEmpMessage('🟢 Time In recorded!', 'success');
                    }
                    break;


                case 2: // Time Out
                    if (!r.timeIn) {
                        showEmpMessage('Please Time In first!', 'warning');
                    } else if (r.timeOut) {
                        showEmpMessage('Already Time Out today!', 'warning');
                    } else {
                        employeeData[id].timeOut = new Date();
                        localStorage.setItem('employeeData', JSON.stringify(employeeData));
                        showEmpRecord(id);
                        showEmpMessage('🔴 Time Out recorded!', 'success');
                    }
                    break;


                case 3: // Lunch Start
                    if (!r.timeIn) {
                        showEmpMessage('Time In first!', 'warning');
                    } else if (r.lunchStart) {
                        showEmpMessage('Lunch already started!', 'warning');
                    } else {
                        employeeData[id].lunchStart = new Date();
                        localStorage.setItem('employeeData', JSON.stringify(employeeData));
                        showEmpMessage('🍽️ Lunch started!', 'success');
                    }
                    break;


                case 4: // Lunch End
                    if (!r.lunchStart) {
                        showEmpMessage('Lunch Start first!', 'warning');
                    } else if (r.lunchEnd) {
                        showEmpMessage('Lunch already ended!', 'warning');
                    } else {
                        employeeData[id].lunchEnd = new Date();
                        localStorage.setItem('employeeData', JSON.stringify(employeeData));
                        showEmpMessage('✅ Lunch ended!', 'success');
                    }
                    break;


                case 5: // View Record
                    showEmpRecord(id);
                    break;
            }
        }


        function showEmpRecord(id) {
            const r = employeeData[id];
            const account = employeeAccounts[id];
            const hours = calcHours(r);
           
            let html = `
                <div class="record-card">
                    <h3>${account.name} (${id})</h3>
            `;
           
            if (r.timeIn) html += `<p>🟢 Time In: ${formatTime(r.timeIn)}</p>`;
            if (r.lunchStart && r.lunchEnd) html += `<p>🍽️ Lunch: ${formatTime(r.lunchStart)} - ${formatTime(r.lunchEnd)}</p>`;
            if (r.timeOut) html += `<p>🔴 Time Out: ${formatTime(r.timeOut)}</p>`;
           
            html += `<p><strong>Total: ${hours} hours</strong></p></div>`;
           
            document.getElementById('emp-logs').innerHTML = html;
        }


        function showEmpMessage(msg, type) {
            const logs = document.getElementById('emp-logs');
            logs.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                if (type !== 'success') logs.innerHTML = 'Ready to track your time...';
            }, 3000);
        }


        // ADMIN FUNCTIONS
        const ADMIN_PASSWORD = 'admin123';


        function adminLogin() {
            const id = document.getElementById('admin-id').value.trim().toUpperCase();
            const pass = document.getElementById('admin-pass').value;


            if (pass !== ADMIN_PASSWORD) {
                // document.getElementById('admin-logs').innerHTML = '<div class="message_error">Wrong Password!</div>';
                alert("Wrong username or password")
                return;
            }


            currentAdminUser = id;
            document.getElementById('admin-user').textContent = id;
            showSection('admin-dashboard');
        }


        function adminLogout() {
            currentAdminUser = null;
            showMainLogin();
        }


        function adminViewSingle() {
            const id = document.getElementById('search-emp').value.trim().toUpperCase();
            if (!id) return showAdminMessage('Enter Employee ID', 'warning');


            const account = employeeAccounts[id];
            const r = employeeData[id];
           
            if (!account) {
                showAdminMessage(`No employee found with ID: ${id}`, 'error');
                return;
            }


            document.getElementById('admin-logs').innerHTML = `
                <div class="record-card">
                    <h3>${account.name} (${id})</h3>
                    ${r.timeIn ? `<p>🟢 Time In: ${formatTime(r.timeIn)}</p>` : '<p>🟢 Time In: Not set</p>'}
                    ${r.lunchStart ? `<p>🍽️ Lunch Start: ${formatTime(r.lunchStart)}</p>` : '<p>🍽️ Lunch Start: Not set</p>'}
                    ${r.lunchEnd ? `<p>🍽️ Lunch End: ${formatTime(r.lunchEnd)}</p>` : '<p>🍽️ Lunch End: Not set</p>'}
                    ${r.timeOut ? `<p>🔴 Time Out: ${formatTime(r.timeOut)}</p>` : '<p>🔴 Time Out: Not set</p>'}
                </div>
            `;
        }


        function adminViewAll() {
    if (Object.keys(employeeAccounts).length === 0) {
        showAdminMessage('No registered employees', 'warning');
        return;
    }


    let html = '<div class="summary-card"><h3>All Employees (' + Object.keys(employeeAccounts).length + ')</h3></div>';


    Object.entries(employeeAccounts).forEach(([id, account]) => {
        const r = employeeData[id] || {};
        const totalHours = calcHours(r); // ✅ GET TOTAL HOURS


        html += `
            <div class="record-card">
                <strong>${id}: ${account.name}</strong><br>
                <small>
                    🟢 Time In: ${formatTime(r.timeIn)}<br>
                    🍽️ Start Lunch: ${formatTime(r.lunchStart)} | 🍽️ End Lunch: ${formatTime(r.lunchEnd)}<br>
                    🔴 Time Out: ${formatTime(r.timeOut)}<br>
                    <strong>⏱️ Total Work Hours: ${totalHours} hrs</strong> <!-- ✅ ADDED -->
                </small>
            </div>
        `;
    });


    document.getElementById('admin-logs').innerHTML = html;
}


        function adminManageUsers() {
            if (Object.keys(employeeAccounts).length === 0) {
                showAdminMessage('No registered employees', 'warning');
                return;
            }


            let html = '<div class="summary-card"><h3>Registered Employees</h3></div>';
            Object.entries(employeeAccounts).forEach(([id, account]) => {
                html += `
                    <div class="record-card">
                        <strong>${id}</strong> - ${account.name} (${account.username})<br>
                        <small>Created: ${account.created}</small>
                    </div>
                `;
            });
            document.getElementById('admin-logs').innerHTML = html;
        }


        function adminClear() {
            document.getElementById('admin-logs').innerHTML = 'Admin dashboard ready...';
            document.getElementById('search-emp').value = '';
        }


        function showAdminMessage(msg, type) {
            const logs = document.getElementById('admin-logs');
            logs.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                logs.innerHTML = 'Admin dashboard ready...';
            }, 3000);
        }


        // UTILITY FUNCTIONS
        function formatTime(t) {
            return t ? new Date(t).toLocaleString() : 'Not set';
        }


        function calcHours(r) {
    if (!r.timeIn || !r.timeOut) return '0.00';


    let timeIn = new Date(r.timeIn);
    let timeOut = new Date(r.timeOut);


    if (isNaN(timeIn) || isNaN(timeOut)) return '0.00';


    let total = (timeOut - timeIn) / 3600000;


    if (r.lunchStart && r.lunchEnd) {
        let lunchStart = new Date(r.lunchStart);
        let lunchEnd = new Date(r.lunchEnd);


        if (!isNaN(lunchStart) && !isNaN(lunchEnd)) {
            total -= (lunchEnd - lunchStart) / 3600000;
        }
    }


    if (isNaN(total) || total < 0) return '0.00';


    return total.toFixed(2);
}
    </script>
</body>
</html>
